name: CD - oneclick

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ======================
      # Checkout current repo
      # ======================
      - name: Checkout current repo
        uses: actions/checkout@v4

      # ======================
      # Setup cluster context
      # ======================
      - name: Apply Ingress, PV & Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl get ns
          kubectl apply -f k8s/ingress/
          kubectl get svc -n ingress-nginx
          kubectl apply -f k8s/pv
          kubectl get pv

      # ======================
      # MONITOR-LOGS
      # ======================
      - name: Checkout MONITOR-LOGS
        uses: actions/checkout@v4
        with:
          repository: awsdeployer/MONITOR-LOGS
          path: MONITOR-LOGS

      - name: Apply MONITOR-LOGS manifests
        run: |
          kubectl apply -f MONITOR-LOGS/backend/k8s/ --recursive
          kubectl wait --for=condition=ready pod -l app=flask-monitor -n ashapp --timeout=180s

      # ======================
      # HISTORY-SERVICES
      # ======================
      - name: Checkout HISTORY-SERVICES
        uses: actions/checkout@v4
        with:
          repository: awsdeployer/HISTORY-SERVICES
          path: HISTORY-SERVICES

      - name: Apply HISTORY-SERVICES manifests
        run: |
          kubectl apply -f HISTORY-SERVICES/backend/k8s/ --recursive
          kubectl wait --for=condition=ready pod -l app=history-service -n ashapp --timeout=180s

      # ======================
      # AWS-ASHAPP
      # ======================
      - name: Checkout AWS-ASHAPP
        uses: actions/checkout@v4
        with:
          repository: awsdeployer/AWS-ASHAPP
          path: AWS-ASHAPP

      - name: Apply AWS-ASHAPP manifests
        run: |
          kubectl apply -f AWS-ASHAPP/backend/k8s/ --recursive
          kubectl wait --for=condition=ready pod -l app=flask-app -n ashapp --timeout=180s

      # ======================
      # AUTOMATIC-DEPLOYER
      # ======================
      - name: Checkout AUTOMATIC-DEPLOYER
        uses: actions/checkout@v4
        with:
          repository: awsdeployer/AUTOMATIC-DEPLOYER
          path: AUTOMATIC-DEPLOYER

      - name: Apply AUTOMATIC-DEPLOYER manifests
        run: |
          kubectl apply -f AUTOMATIC-DEPLOYER/backend/k8s/ --recursive
          kubectl wait --for=condition=ready pod -l app=deployer-app -n ashapp --timeout=180s
