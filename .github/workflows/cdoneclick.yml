name: CD - oneclick

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Apply Ingress & Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl get ns
          kubectl apply -f k8s/ingress/
          kubectl get svc -n ingress-nginx

      - name: Deploy MONITOR-LOGS
        run: |
          git clone https://github.com/awsdeployer/MONITOR-LOGS.git
          kubectl apply -f MONITOR-LOGS/backend/k8s/ --recursive
          kubectl get deploy flask-monitor -n ashapp

      - name: Deploy AWS-ASHAPP
        run: |
          git clone https://github.com/awsdeployer/AWS-ASHAPP.git
          kubectl apply -f AWS-ASHAPP/backend/k8s/ --recursive
          kubectl get deploy flask-app -n ashapp

      - name: Deploy HISTORY-SERVICES
        run: |
          git clone https://github.com/awsdeployer/HISTORY-SERVICES.git
          kubectl apply -f HISTORY-SERVICES/backend/k8s/ --recursive
          kubectl get deploy history-service -n ashapp

      - name: Deploy AUTOMATIC-DEPLOYER
        run: |
          git clone https://github.com/awsdeployer/AUTOMATIC-DEPLOYER.git
          kubectl apply -f AUTOMATIC-DEPLOYER/backend/k8s/ --recursive
          kubectl get deploy deployer-app -n ashapp
      # ======================
      # Cleanup cloned repos
      # ======================
      - name: Cleanup repos
        run: |
          rm -rf MONITOR-LOGS
          rm -rf AWS-ASHAPP
          rm -rf HISTORY-SERVICES
          rm -rf AUTOMATIC-DEPLOYER

