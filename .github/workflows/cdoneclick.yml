name: CD - oneclick

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # ======================
      # Setup cluster context
      # ======================
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Apply Ingress & Namespace
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl get ns
          kubectl apply -f k8s/ingress/
          kubectl get svc -n ingress-nginx

      # ======================
      # AWS-ASHAPP
      # ======================
      - name: Deploy AWS-ASHAPP
        run: |
          git clone https://github.com/awsdeployer/AWS-ASHAPP.git
          cd AWS-ASHAPP
          GIT_SHA=$(cat backend/GIT_SHA.txt)
          echo "Using AWS-ASHAPP image with SHA: $GIT_SHA"
          kubectl apply -f backend/k8s/ --recursive
          kubectl set image deployment/flask-app \
            flask-app=${{ secrets.DOCKER_HUB_USERNAME }}/flask-app:$GIT_SHA \
            -n ashapp
          kubectl rollout status deployment/flask-app -n ashapp
          cd ..

      # ======================
      # HISTORY-SERVICES
      # ======================
      - name: Deploy HISTORY-SERVICES
        run: |
          git clone https://github.com/awsdeployer/HISTORY-SERVICES.git
          cd HISTORY-SERVICES
          GIT_SHA=$(cat backend/GIT_SHA.txt)
          echo "Using HISTORY-SERVICES image with SHA: $GIT_SHA"
          kubectl apply -f backend/k8s/ --recursive
          kubectl set image deployment/history-service \
            history-service=${{ secrets.DOCKER_HUB_USERNAME }}/history-service:$GIT_SHA \
            -n ashapp
          kubectl rollout status deployment/history-service -n ashapp
          cd ..

      # ======================
      # AUTOMATIC-DEPLOYER
      # ======================
      - name: Deploy AUTOMATIC-DEPLOYER
        run: |
          git clone https://github.com/awsdeployer/AUTOMATIC-DEPLOYER.git
          cd AUTOMATIC-DEPLOYER
          GIT_SHA=$(cat backend/GIT_SHA.txt)
          echo "Using AUTOMATIC-DEPLOYER image with SHA: $GIT_SHA"
          kubectl apply -f backend/k8s/ --recursive
          kubectl set image deployment/deployer-app \
            deployer-app=${{ secrets.DOCKER_HUB_USERNAME }}/deployer-app:$GIT_SHA \
            -n ashapp
          kubectl rollout status deployment/deployer-app -n ashapp
          cd ..
      # ======================
      # MONITOR-LOGS
      # ======================
      - name: Deploy MONITOR-LOGS
        run: |
          git clone https://github.com/awsdeployer/MONITOR-LOGS.git
          cd MONITOR-LOGS
          GIT_SHA=$(cat backend/GIT_SHA.txt)
          echo "Using MONITOR-LOGS image with SHA: $GIT_SHA"
          kubectl apply -f backend/k8s/ --recursive
          kubectl set image deployment/flask-monitor \
            flask-monitor=${{ secrets.DOCKER_HUB_USERNAME }}/flask-monitor:$GIT_SHA \
            -n ashapp
          kubectl rollout status deployment/flask-monitor -n ashapp
          cd ..

      # ======================
      # Cleanup cloned repos
      # ======================
      - name: Cleanup repos
        run: |
          rm -rf MONITOR-LOGS
          rm -rf AWS-ASHAPP
          rm -rf HISTORY-SERVICES
          rm -rf AUTOMATIC-DEPLOYER
